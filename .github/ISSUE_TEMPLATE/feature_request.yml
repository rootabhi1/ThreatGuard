name: Feature request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Please check the
        [ROADMAP](../blob/main/ROADMAP.md) first — it may already be planned.
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      options:
        - label: I searched existing issues/discussions and this isn't a duplicate.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the underlying need, not just the solution — it helps us find the best fit.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you've thought about.
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This fits the project's focus (assistive threat modeling; AI assists, humans decide) and isn't a large scope expansion better discussed first.
          required: false
