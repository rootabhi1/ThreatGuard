name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: threat-modeler
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: threat-modeler/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff

      - name: Lint (ruff)
        run: ruff check .

      - name: Run test suites
        env:
          JWT_SECRET: ci-test-secret
          INITIAL_ADMIN_EMAIL: admin@corp.io
          INITIAL_ADMIN_PASSWORD: AdminPass123!
          RATE_LIMIT_ENABLED: "0"
        run: |
          set -uo pipefail
          echo "Python: $(python -V)"
          total=0; passed=0; failed=0; failed_list=""
          run_start=$(date +%s)
          for t in tests/test_*.py; do
            total=$((total + 1))
            rm -f /tmp/ci.db
            start=$(date +%s)
            out=$(THREAT_MODELER_DB=/tmp/ci.db python "$t" 2>&1); rc=$?
            elapsed=$(( $(date +%s) - start ))
            if [ "$rc" -eq 0 ]; then
              passed=$((passed + 1))
              echo "::group::✅ PASS  $t  (${elapsed}s)"
              echo "$out" | tail -n 6
              echo "::endgroup::"
            else
              failed=$((failed + 1)); failed_list="${failed_list} ${t}"
              # GitHub annotation pins the failure to the file in the UI / PR.
              echo "::error file=threat-modeler/${t}::Test suite failed (exit ${rc})"
              echo "────────────────────────────────────────────────────────"
              echo "❌ FAIL  $t  (${elapsed}s, exit ${rc})"
              echo "──────────────── full output / traceback ────────────────"
              echo "$out"
              echo "────────────────────────────────────────────────────────"
            fi
          done
          run_elapsed=$(( $(date +%s) - run_start ))
          echo ""
          echo "══════════════════════ SUMMARY ══════════════════════"
          echo "Suites: ${total}  |  Passed: ${passed}  |  Failed: ${failed}  |  Total: ${run_elapsed}s"
          if [ "$failed" -gt 0 ]; then
            echo "Failed suites:${failed_list}"
            echo "══════════════════════════════════════════════════════"
            exit 1
          fi
          echo "All ${total} suites passed."
          echo "══════════════════════════════════════════════════════"
