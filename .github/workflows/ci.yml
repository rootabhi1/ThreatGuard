name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: threat-modeler
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: threat-modeler/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff

      - name: Lint (ruff)
        run: ruff check .

      - name: Run test suites
        env:
          JWT_SECRET: ci-test-secret
          INITIAL_ADMIN_EMAIL: admin@corp.io
          INITIAL_ADMIN_PASSWORD: AdminPass123!
          RATE_LIMIT_ENABLED: "0"
        run: |
          fail=0
          for t in tests/test_*.py; do
            echo "::group::$t"
            rm -f /tmp/ci.db
            THREAT_MODELER_DB=/tmp/ci.db python "$t" || fail=1
            echo "::endgroup::"
          done
          exit $fail
