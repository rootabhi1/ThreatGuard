name: Secret scan

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "24 6 * * 1"

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so historical leaks are caught

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # gitleaks-action is free for public repositories and individual
        # accounts. GitHub's native secret scanning + push protection should
        # also be enabled in repository settings as a second layer.
