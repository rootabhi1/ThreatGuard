name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, Mondays 06:24 UTC
    - cron: "24 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    # CodeQL result upload needs code scanning enabled. On private repos that
    # requires GitHub Advanced Security; without it the upload fails with
    # "Code scanning is not enabled for this repository". Gate the job to public
    # repos so it stops failing on this private repo, and auto-resumes if the
    # repo is made public (this repo is a template) or GHAS is enabled — in which
    # case remove this `if`.
    if: ${{ github.event.repository.visibility == 'public' }}
    permissions:
      security-events: write
      contents: read
      # codeql-action reads the workflow run for status/telemetry; without this
      # it fails with "Resource not accessible by integration" (HTTP 403).
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"
