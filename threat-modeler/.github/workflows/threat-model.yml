name: Threat Model CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  threat-model:
    name: Automated Threat Analysis
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r threat-modeler/requirements.txt httpx


      - name: Scan dependencies for CVEs
        run: |
          pip install pip-audit
          pip-audit -r threat-modeler/requirements.txt --format json -o /tmp/audit.json || true
          python3 -c "
import json, sys
data = json.load(open('/tmp/audit.json'))
vulns = data.get('dependencies', []) if isinstance(data, dict) else data
found = [d for d in vulns if d.get('vulns')]
if found:
    print(f\"::warning::Found {len(found)} packages with known CVEs\")
    for d in found:
        for v in d.get('vulns', []):
            print(f\"  {d.get('name')} {d.get('version')}: {v.get('id')} — {v.get('description','')[:80]}\")
else:
    print('No known CVEs found in dependencies')
"

      - name: Run threat model analysis
        id: atm
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python threat-modeler/cli/atm_cli.py analyze \
            --system-file system.json \
            --frameworks stride,dread \
            --threshold high \
            --output-json /tmp/atm_result.json \
            --output-md /tmp/atm_summary.md
        continue-on-error: true

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '### 🛡 Threat Model Analysis';
            try { body = fs.readFileSync('/tmp/atm_summary.md', 'utf8'); } catch {}
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: threat-model-report
          path: /tmp/atm_result.json
          retention-days: 30
