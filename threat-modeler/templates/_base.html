<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ThreatGuard{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <!-- Tailwind is vendored (compiled from templates + JS) so the UI needs no
       external CDN at runtime — it renders fully offline / on locked-down
       networks. Rebuild with scripts/build_css.sh after changing classes. -->
  <link rel="stylesheet" href="/static/css/tailwind.css">
  <link rel="stylesheet" href="/static/css/app.css">
  <script src="/static/js/auth.js"></script>
  <script src="/static/js/ui.js"></script>
  {% block head %}{% endblock %}
</head>
<body>
  <div id="toast-host"></div>
  {% block body %}{% endblock %}
  {% block scripts %}{% endblock %}
</body>
</html>
