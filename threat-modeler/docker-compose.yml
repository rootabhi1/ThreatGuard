services:
  threat-modeler:
    build: .
    container_name: threat-modeler
    ports:
      - "8000:8000"
    environment:
      # --- Required: the app cannot be used without these ---
      # Injected from the host environment or a .env file (see .env.example).
      # The ":?" guard makes `docker compose up` fail fast with a clear message
      # instead of silently generating a throwaway JWT secret on every restart.
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET must be set — generate: python -c 'import secrets; print(secrets.token_urlsafe(48))'}"
      INITIAL_ADMIN_EMAIL: "${INITIAL_ADMIN_EMAIL:?INITIAL_ADMIN_EMAIL must be set}"
      INITIAL_ADMIN_PASSWORD: "${INITIAL_ADMIN_PASSWORD:?INITIAL_ADMIN_PASSWORD must be set}"
      # --- Optional ---
      # Restrict browser origins in production (comma-separated). Default: *
      CORS_ORIGINS: "${CORS_ORIGINS:-*}"
      # Enable Claude LLM enhancement by setting your key
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      # Override the Claude model used for enhancement
      ANTHROPIC_MODEL: "${ANTHROPIC_MODEL:-claude-opus-4-8}"
      # --- Alternate LLM provider (optional) ---
      # "anthropic" (default) or "openai". Auto-detected from the key if unset.
      LLM_PROVIDER: "${LLM_PROVIDER:-}"
      # OpenAI / OpenAI-compatible (Azure, Ollama, LiteLLM, OpenRouter, ...)
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-}"
    volumes:
      # Persist the SQLite project DB across container restarts
      - ./data:/app/data
      - ./uploads:/app/uploads
    restart: unless-stopped
