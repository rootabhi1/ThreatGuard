# Pragmatic lint config for the v0.1 Community Preview.
# Enforce real-bug rules now; defer cosmetic style to a later cleanup so CI is
# meaningful and green rather than a wall of style noise.
target-version = "py311"
line-length = 120

[lint]
select = ["E4", "E7", "E9", "F"]
ignore = [
    "E402",  # module import not at top — a few modules set env before import
    "E701",  # multiple statements on one line (colon) — pervasive existing style
    "E702",  # multiple statements on one line (semicolon) — pervasive existing style
    "E722",  # bare except — tracked as tech debt
    "E741",  # ambiguous variable name — tracked
    "F541",  # f-string without placeholders — harmless
    "F841",  # unused local variable — tracked as tech debt
]

[lint.per-file-ignores]
"tests/*" = ["E501"]
