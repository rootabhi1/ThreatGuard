# ─────────────────────────────────────────────────────────
#  ThreatGuard — docker-compose.yml
#  Usage:
#    cp .env.example .env   # fill in your values
#    docker compose up -d
#    open http://localhost:8000
# ─────────────────────────────────────────────────────────
version: "3.9"

services:
  threat-modeler:
    build:
      context: .
      dockerfile: Dockerfile
    image: threatguard:latest
    container_name: threat-modeler
    ports:
      - "8000:8000"     # http://localhost:8000
    environment:
      # ── Required ──────────────────────────────────────
      INITIAL_ADMIN_EMAIL:    "${INITIAL_ADMIN_EMAIL}"
      INITIAL_ADMIN_PASSWORD: "${INITIAL_ADMIN_PASSWORD}"
      JWT_SECRET:             "${JWT_SECRET}"
      # ── Optional ──────────────────────────────────────
      ANTHROPIC_API_KEY:      "${ANTHROPIC_API_KEY:-}"     # enables AI enrichment
      HOST:                   "0.0.0.0"
      PORT:                   "8000"
      CORS_ORIGINS:           "${CORS_ORIGINS:-*}"
    volumes:
      - ./data:/app/data         # SQLite database (persists across restarts)
      - ./uploads:/app/uploads   # uploaded files
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

# Named volumes alternative (if you prefer Docker-managed storage):
# volumes:
#   threat_data:
#   threat_uploads:
